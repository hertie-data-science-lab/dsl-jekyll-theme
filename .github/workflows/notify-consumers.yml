name: Notify consumers

# When the theme changes, tell every consumer site to rebuild so the restyle
# propagates. Consumers listen for a `repository_dispatch` of type `theme-updated`.
#
# Requires a repo secret THEME_DISPATCH_TOKEN: a fine-grained PAT (or GitHub App
# token) with `actions: write` on the consumer repos. The default GITHUB_TOKEN
# cannot trigger workflows in other repositories.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'consumers.txt'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dispatch theme-updated to consumers
        env:
          TOKEN: ${{ secrets.THEME_DISPATCH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "THEME_DISPATCH_TOKEN not set — skipping fan-out (configure the secret to enable)."
            exit 0
          fi
          # consumers.txt: one owner/repo per line; blank lines and # comments ignored.
          grep -vE '^[[:space:]]*(#|$)' consumers.txt | while read -r repo; do
            repo="$(echo "$repo" | tr -d '[:space:]')"
            [ -z "$repo" ] && continue
            echo "Dispatching theme-updated -> $repo"
            code=$(curl -sS -o /tmp/resp -w '%{http_code}' -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${repo}/dispatches" \
              -d '{"event_type":"theme-updated"}')
            if [ "$code" != "204" ]; then
              echo "::warning::dispatch to ${repo} returned HTTP ${code}"; cat /tmp/resp || true
            fi
          done
